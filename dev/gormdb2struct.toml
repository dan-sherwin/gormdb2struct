# gormdb2struct configuration
ConfigVersion = 1

# ----------------------------------------------------------------------
# Generator
# ----------------------------------------------------------------------

[Generator]
OutPath = "./db"
OutPackagePath = "foo/db"
CleanUp = true
ImportPackagePaths = [
    "go.corp.spacelink.com/sdks/go/sl_datatypes",
    "github.com/dan-sherwin/gormdb2struct/pgtypes",
    "github.com/google/uuid",
]
# Objects = ["tickets", "ticket_extended_source", "ticket_extended"]

# ----------------------------------------------------------------------
# Database
# Keep only the database subsection that matches Database.Dialect.
# ----------------------------------------------------------------------

[Database]
Dialect = "postgresql"

[Database.PostgreSQL]
Host = "invictus"
Port = 5432
Name = "ticket_data_core"
User = "ticket_management_service"
Password = "@4POi$VhdT#*mg@v^Kl0"
SSLMode = false

[Database.SQLite]
# Path = "./dev/schema.db"

# ----------------------------------------------------------------------
# Optional generation sections
# ----------------------------------------------------------------------

[DbInit]
Enabled = false
IncludeAutoMigrate = false
GenerateAppSettingsRegistration = false
UseSlogGormLogger = false

[TypeMap]
"spacelink_identifier" = "sl_datatypes.SpacelinkIdentifier"
"spacelink_tenant_number" = "sl_datatypes.SpacelinkTenantNumber"
"centi_amount" = "sl_datatypes.MilliAmount"
"signed_centi_amount" = "sl_datatypes.MilliAmount"
"public.centi_amount" = "sl_datatypes.MilliAmount"
"public.signed_centi_amount" = "sl_datatypes.MilliAmount"

[ExtraFields]
[[ExtraFields."ticket_extended"]]
StructPropName = "Attachments"
StructPropType = "models.Attachment"
FkStructPropName = "TicketID"
RefStructPropName = "TicketID"
HasMany = true
Pointer = true

[JSONTagOverridesByTable]
# [JSONTagOverridesByTable."ticket_extended"]
# subject_fts = "-"

# ----------------------------------------------------------------------
# PostgreSQL-only sections
# ----------------------------------------------------------------------

[PostgreSQL.GeneratedTypes]
PackageName = "types"
RelativePath = "models/types"
PackagePath = ""

[PostgreSQL.GeneratedTypes.TypeMap]
"ticket_impact_severity" = "TicketImpactSeverity"
"ticket_priority" = "TicketPriority"
"ticket_relation_type" = "TicketRelationType"
"ticket_status" = "TicketStatus"
"ticket_type" = "TicketType"
"ticket_type[]" = "TicketTypeArray"
